<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晨练 · 今日训练</title>
<style>
  :root{
    --bg:#f4f1ea; --card:#fffdf8; --ink:#2b2a26; --sub:#8a857a;
    --line:#e7e2d6; --accent:#c2703d; --accent-soft:#f0dccb;
    --done:#7a9a6b; --shadow:0 2px 14px rgba(60,50,30,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;
    padding:20px 16px 80px;max-width:600px;margin:0 auto;
  }
  header{margin-bottom:14px}
  .date{font-size:13px;color:var(--sub);letter-spacing:.5px}
  h1{font-size:22px;margin:4px 0 2px;font-weight:700}
  .theme{font-size:14px;color:var(--accent);font-weight:600}
  .meta{font-size:13px;color:var(--sub);margin-top:2px}

  /* 星期切换 */
  .days{display:flex;gap:6px;margin:14px 0 18px}
  .day{
    flex:1;text-align:center;font-size:13px;padding:9px 0;border-radius:10px;
    border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--sub);
  }
  .day.sel{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .day.today{border-color:var(--accent)}

  .start-all{
    width:100%;border:none;background:var(--accent);color:#fff;
    font-size:17px;font-weight:700;padding:16px;border-radius:14px;
    margin:0 0 22px;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s;
  }
  .start-all:active{transform:scale(.98)}

  .step{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin-bottom:14px;box-shadow:var(--shadow);
    transition:border-color .2s,opacity .2s;
  }
  .step.active{border-color:var(--accent);border-width:2px;padding:15px}
  .step.done{opacity:.55}
  .step-top{display:flex;align-items:center;gap:10px;cursor:pointer}
  .badge{
    width:30px;height:30px;flex:none;border-radius:50%;background:var(--accent-soft);
    color:var(--accent);font-weight:700;font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .step.done .badge{background:var(--done);color:#fff}
  .step-title{font-size:16px;font-weight:700;flex:1}
  .step-min{font-size:12px;color:var(--sub);flex:none}
  .chev{font-size:13px;color:var(--sub);flex:none;margin-left:4px}
  .goal{font-size:13px;color:var(--sub);margin:8px 0 0;padding-left:40px}

  .body{display:none;margin-top:14px}
  .step.active .body{display:block}

  .player{
    position:relative;width:100%;aspect-ratio:16/9;background:#000;
    border-radius:12px;overflow:hidden;margin-bottom:12px;
  }
  .player iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .player .placeholder{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;cursor:pointer;color:#fff;
  }
  .player .play-ico{
    width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.15);
    border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:22px;
  }
  .fallback{font-size:12px;color:var(--sub);margin:-4px 0 12px;text-align:center}
  .fallback a{color:var(--accent)}

  .picker-label{font-size:12px;color:var(--sub);margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .chip{
    display:inline-flex;align-items:center;gap:7px;
    font-size:12.5px;padding:7px 9px 7px 11px;border-radius:20px;border:1px solid var(--line);
    background:#fff;color:var(--ink);
  }
  .chip.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip-lbl{cursor:pointer}
  .chip-del{
    cursor:pointer;font-weight:700;font-size:14px;line-height:1;opacity:.45;
    width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;
  }
  .chip-del:hover{opacity:1;background:rgba(192,57,43,.12);color:#c0392b}
  .chip.sel .chip-del:hover{background:rgba(255,255,255,.25);color:#fff}
  .custom{display:flex;gap:8px;margin-bottom:4px}
  .custom input{
    flex:1;font-size:13px;padding:8px 10px;border:1px solid var(--line);
    border-radius:9px;background:#fff;min-width:0;
  }
  .custom button{
    font-size:13px;padding:8px 12px;border:1px solid var(--line);background:#fff;
    border-radius:9px;cursor:pointer;white-space:nowrap;
  }

  .finish-day{
    width:100%;border:none;background:var(--done);color:#fff;font-size:15px;
    font-weight:700;padding:14px;border-radius:12px;cursor:pointer;margin-top:4px;
  }
  .done-banner{
    text-align:center;padding:28px 16px;background:var(--card);border-radius:16px;
    border:1px solid var(--line);box-shadow:var(--shadow);display:none;margin-bottom:14px;
  }
  .done-banner.show{display:block}
  .done-banner .big{font-size:20px;font-weight:700;margin-bottom:6px}
  .streak{font-size:14px;color:var(--sub)}
  .streak b{color:var(--accent);font-size:16px}

  footer{text-align:center;font-size:12px;color:var(--sub);margin-top:24px}
  .tip{font-size:12px;color:var(--sub);margin:12px 0 0;padding:10px 12px;background:#fbf6ec;border-radius:10px}
</style>
</head>
<body>
<header>
  <div class="date" id="date"></div>
  <h1>今日训练</h1>
  <div class="theme" id="theme"></div>
  <div class="meta" id="meta"></div>
</header>

<div class="days" id="days"></div>

<div class="done-banner" id="doneBanner">
  <div class="big">✅ 今天完成了</div>
  <div class="streak">连续打卡 <b id="streakNum">0</b> 天 · 明天见</div>
</div>

<button class="start-all" id="startAll">▶ 开始 · 从第一节起</button>

<div id="steps"></div>

<button class="finish-day" id="finishDay">✅ 标记今天完成</button>

<div class="tip">
  提示:八段锦默认放了一条国家体育总局12分钟版,<b>建议换成你自己那条</b>——在视频下方粘贴框贴 B站链接或 BV 号即可,页面会记住。若某条视频加载不出,点它下方的"在 B站打开"直接看。
</div>

<footer>晨练播放器 · 数据只存在你本机</footer>

<script>
// ---- 视频库(全部为真实 B站 BV 号,可自行替换) ----
const PLAN = {
  neck: {
    title:"肩颈唤醒", min:"5 分钟", goal:"缓解久坐圆肩脖子僵,慢一点、配呼吸",
    videos:[
      {bv:"BV1Rg411w7nD", label:"10分钟肩颈瑜伽(推荐)"},
      {bv:"BV1Bz4y1D7X3", label:"3分钟·没时间版"},
      {bv:"BV1oW411t73F", label:"1分钟·超快"},
    ]
  },
  baduan: {
    title:"八段锦", min:"约 12–15 分钟", goal:"今日主体,舒展全身",
    videos:[
      {bv:"BV1VsDpYXEqD", label:"总局12分钟版(默认)"},
      {bv:"BV1gT4y1m7ec", label:"带呼吸口令·经典"},
      {bv:"BV1n4411Y7e1", label:"教学示范版"},
    ]
  },
  abs: {
    title:"轻度练腹", min:"10 分钟", goal:"不伤腰、不跑跳,久坐党友好",
    videos:[
      {bv:"BV1KeLm6JE39", label:"10分钟腰腹·不伤腰(推荐)"},
      {bv:"BV1oV411p7Rb", label:"10分钟肚腩消减·热门"},
      {bv:"BV1HZ4y1W78g", label:"10分钟强健腹肌"},
    ]
  },
  glutes: {
    title:"轻度练臀", min:"10 分钟", goal:"顶胯不顶腰,顶端夹一秒",
    videos:[
      {bv:"BV1Pg7m6XEte", label:"臀桥·腰膝不适必练(推荐)"},
      {bv:"BV1P5411W7kv", label:"臀桥正确做法·讲解"},
    ]
  },
  arms: {
    title:"轻度练手臂", min:"8–10 分钟", goal:"沉肩不耸肩,消拜拜肉、紧致线条",
    videos:[
      {bv:"BV1YD4y197Wn", label:"10分钟瘦手臂·超热门(推荐)"},
      {bv:"BV1AK411T7CH", label:"帕梅拉·水壶紧实手臂"},
      {bv:"BV1P1421k7Kz", label:"站坐都可练·新手友好"},
    ]
  },
};

const WEEK = ["周日","周一","周二","周三","周四","周五","周六"];
// 力量项三选一轮换:周一腹 周二臀 周三手臂 周四腹 周五臀 周六手臂 周日恢复
const FOCUS = {1:"abs", 2:"glutes", 3:"arms", 4:"abs", 5:"glutes", 6:"arms"};
const FOCUS_CN = {abs:"腹", glutes:"臀", arms:"手臂"};
function daySequence(d){
  if(d===0) return {keys:["neck","baduan"], theme:"恢复日 · 轻松收尾"};
  const focus = FOCUS[d];
  return {keys:["neck","baduan",focus], theme:"肩颈 + 八段锦 + "+FOCUS_CN[focus]};
}

// ---- 状态与本地存储 ----
const today = new Date().getDay();
let viewDay = today;                 // 当前查看的星期
let seq = daySequence(viewDay);
const LS_VID="mw_videos", LS_SEL="mw_sel", LS_LOG="mw_log";
const store = JSON.parse(localStorage.getItem(LS_VID)||"{}");  // {key:[{bv,label}]} 用户维护的完整列表
const sel = JSON.parse(localStorage.getItem(LS_SEL)||"{}");    // {key:bv} 当前选中
function getVideos(key){ return store[key] || PLAN[key].videos.slice(); }
function saveVideos(){ localStorage.setItem(LS_VID,JSON.stringify(store)); }
function getBv(key){
  const list=getVideos(key), cur=sel[key];
  if(cur && list.some(v=>v.bv===cur)) return cur;
  return list.length ? list[0].bv : null;
}
function parseBv(s){ const m=(s||"").match(/BV[0-9A-Za-z]{10}/); return m?m[0]:null; }
function addVideo(key,bv){
  const list=getVideos(key);
  if(list.some(v=>v.bv===bv)) return;         // 已存在则不重复加
  list.push({bv, label:"自定义 "+bv.slice(-4)});
  store[key]=list; saveVideos();
}
function delVideo(key,bv){
  store[key]=getVideos(key).filter(v=>v.bv!==bv); saveVideos();
  if(sel[key]===bv){ delete sel[key]; localStorage.setItem(LS_SEL,JSON.stringify(sel)); }
}
let current=-1;

const now=new Date();
const dateEl=document.getElementById("date");
const stepsEl=document.getElementById("steps");

// ---- 星期切换 ----
const daysEl=document.getElementById("days");
const ORDER=[1,2,3,4,5,6,0]; // 周一→周日
function renderDays(){
  daysEl.innerHTML="";
  ORDER.forEach(d=>{
    const b=document.createElement("div");
    b.className="day"+(d===viewDay?" sel":"")+(d===today?" today":"");
    b.textContent=WEEK[d].replace("周","");
    b.onclick=()=>{ viewDay=d; seq=daySequence(d); current=-1; renderDays(); renderHead(); render(); };
    daysEl.appendChild(b);
  });
}
function renderHead(){
  const tag = viewDay===today ? `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · 今天` : "预览";
  dateEl.textContent=`${WEEK[viewDay]} · ${tag}`;
  document.getElementById("theme").textContent=seq.theme;
  document.getElementById("meta").textContent="共 "+seq.keys.length+" 节 · 约 30 分钟";
}

// ---- 渲染步骤 ----
function render(){
  stepsEl.innerHTML="";
  seq.keys.forEach((key,i)=>{
    const p=PLAN[key];
    const activeBv=getBv(key);
    const isActive=i===current;
    const isDone=i<current;
    const step=document.createElement("div");
    step.className="step"+(isActive?" active":"")+(isDone?" done":"");

    const vids=getVideos(key);
    const chips=vids.map(v=>
      `<div class="chip${v.bv===activeBv?" sel":""}" data-key="${key}">
         <span class="chip-lbl" data-pick="${v.bv}">${v.label}</span>
         <span class="chip-del" data-del="${v.bv}" title="删除">×</span>
       </div>`
    ).join("");

    step.innerHTML=`
      <div class="step-top" data-open="${i}">
        <div class="badge">${isDone?"✓":i+1}</div>
        <div class="step-title">${p.title}</div>
        <div class="step-min">${p.min}</div>
        <div class="chev">${isActive?"▾":"▸"}</div>
      </div>
      <div class="goal">${p.goal}</div>
      <div class="body">
        <div class="player" data-key="${key}">
          <div class="placeholder" data-play="${key}">
            <div class="play-ico">▶</div><div>点击播放 · 开始跟练</div>
          </div>
        </div>
        <div class="fallback">加载不出?<a href="https://www.bilibili.com/video/${activeBv}" target="_blank" rel="noopener">在 B站打开这条 ↗</a></div>
        <div class="picker-label">视频列表(点标签播放,点 × 删除):</div>
        <div class="chips">${chips}</div>
        <div class="custom">
          <input type="text" placeholder="粘贴 B站链接或 BV号 → 添加" data-inp="${key}">
          <button data-add="${key}">＋ 添加</button>
        </div>
      </div>`;
    stepsEl.appendChild(step);
  });
  bind();
}

function loadPlayer(key){
  const wrap=document.querySelector(`.player[data-key="${key}"]`);
  if(!wrap) return;
  const bv=getBv(key);
  // 必须用显式 https:协议相对 // 在 file:// 下会被当成 file:// 而加载失败
  wrap.innerHTML=`<iframe src="https://player.bilibili.com/player.html?bvid=${bv}&page=1&autoplay=1&high_quality=1&danmaku=0"
    scrolling="no" frameborder="no" allowfullscreen="true" allow="autoplay; fullscreen"></iframe>`;
}

// 点卡片标题即展开 + 自动播放(手风琴:只开一节)
function openStep(i){
  current=i; render();
  const el=stepsEl.children[i];
  if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
  setTimeout(()=>loadPlayer(seq.keys[i]),150);
}

function bind(){
  document.querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>{
    const i=+el.dataset.open;
    if(i===current){ current=-1; render(); }   // 再点一次收起
    else openStep(i);
  });
  document.querySelectorAll("[data-play]").forEach(el=>el.onclick=(e)=>{ e.stopPropagation(); loadPlayer(el.dataset.play); });
  // 点标签 → 选中并播放
  document.querySelectorAll(".chip-lbl").forEach(el=>el.onclick=()=>{
    const key=el.closest(".chip").dataset.key, bv=el.dataset.pick;
    sel[key]=bv; localStorage.setItem(LS_SEL,JSON.stringify(sel));
    current=seq.keys.indexOf(key); render(); loadPlayer(key);
  });
  // 点 × → 删除
  document.querySelectorAll(".chip-del").forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const key=el.closest(".chip").dataset.key, bv=el.dataset.del;
    if(getVideos(key).length<=1){ el.closest(".chip").querySelector(".chip-lbl").textContent="至少留一个"; return; }
    delVideo(key,bv);
    current=seq.keys.indexOf(key); render();
  });
  // 添加新视频
  document.querySelectorAll("[data-add]").forEach(el=>el.onclick=()=>{
    const key=el.dataset.add;
    const inp=document.querySelector(`[data-inp="${key}"]`);
    const bv=parseBv(inp.value);
    if(!bv){ inp.value=""; inp.placeholder="没识别到 BV 号,请贴含 BVxxx 的链接"; return; }
    addVideo(key,bv); sel[key]=bv; localStorage.setItem(LS_SEL,JSON.stringify(sel));
    inp.value="";
    current=seq.keys.indexOf(key); render(); loadPlayer(key);
  });
}

function finishDay(){
  const log=JSON.parse(localStorage.getItem(LS_LOG)||"[]");
  const key=`${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
  if(!log.includes(key)) log.push(key);
  localStorage.setItem(LS_LOG,JSON.stringify(log));
  let streak=0, d=new Date();
  for(;;){
    const k=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    if(log.includes(k)){ streak++; d.setDate(d.getDate()-1); } else break;
  }
  document.getElementById("streakNum").textContent=streak;
  document.getElementById("doneBanner").classList.add("show");
  document.getElementById("doneBanner").scrollIntoView({behavior:"smooth"});
}

document.getElementById("startAll").onclick=()=>openStep(0);
document.getElementById("finishDay").onclick=finishDay;

renderDays(); renderHead(); render();
</script>
</body>
</html>
